name: Kali Linux RDP — Chrome Remote Desktop + XFCE

# ┌─────────────────────────────────────────────────────────────────┐
# │  HOW TO GET YOUR CRD AUTH COMMAND (do this right before run):  │
# │  1. Open https://remotedesktop.google.com/headless              │
# │  2. Click  Begin → Next → Authorize  (sign in with Google)      │
# │  3. Copy the full Debian command shown — it looks like:         │
# │     DISPLAY= /opt/google/chrome-remote-desktop/start-host \    │
# │       --code="4/0Axxx" --redirect-url="https://..." --name=""  │
# │  4. Paste it into the "CRD Auth Command" input below.           │
# │  ⚠  The code expires in ~5 min — paste & click Run immediately │
# └─────────────────────────────────────────────────────────────────┘

on:
  workflow_dispatch:
    inputs:
      crd_auth_command:
        description: >
          CRD Auth Command — from https://remotedesktop.google.com/headless
          (Begin → Next → Authorize → copy the full Debian command shown)
        required: true
        type: string

      rdp_pin:
        description: "Remote Desktop PIN (min 6 digits, numbers only)"
        required: true
        default: "123456"
        type: string

      tunnel_duration:
        description: "Session duration in seconds (max 21600 = 6 h)"
        required: true
        default: "21600"
        type: string

jobs:
  kali-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ── 1. Prep: pin Ubuntu system packages BEFORE adding Kali repo ───────
      #
      # ROOT CAUSE OF THE ERROR:
      #   Kali's base-files does dpkg-divert on /lib32 → /lib32.usr-is-merged
      #   Ubuntu's base-files already diverted /lib32 → /.lib32.usr-is-merged
      #   Two conflicting diversions = fatal dpkg error, exit 100.
      #
      # FIX — two layers:
      #   1. apt preferences  → Ubuntu packages always win (priority 900 vs 100)
      #   2. apt-mark hold    → hard-lock core system packages so apt never
      #                         even tries to upgrade them from Kali
      - name: Configure apt pinning & hold system packages
        run: |
          # Layer 1 — apt preferences (Kali tools install, system stays Ubuntu)
          sudo tee /etc/apt/preferences.d/99-kali-pin > /dev/null << 'EOF'
Package: *
Pin: release o=Ubuntu
Pin-Priority: 900

Package: *
Pin: release o=Kali
Pin-Priority: 100
EOF

          # Layer 2 — hard hold packages whose dpkg-divert would clash
          sudo apt-mark hold \
            base-files \
            base-passwd \
            libc6 \
            libc-bin \
            libc6-dev \
            dpkg \
            apt \
            apt-utils \
            perl-base \
            login \
            passwd \
            util-linux \
            mount \
            init-system-helpers \
            systemd \
            libsystemd0 \
            udev \
            bash \
            dash \
            grep \
            sed \
            tar \
            gzip \
            coreutils \
            findutils \
            diffutils

          echo "Pinning & holds applied — Ubuntu system packages are protected."

      # ── 2. Add Kali Linux rolling repository ─────────────────────────────
      - name: Add Kali Linux repository
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends curl wget gnupg2 ca-certificates

          echo "deb http://http.kali.org/kali kali-rolling main contrib non-free non-free-firmware" \
            | sudo tee /etc/apt/sources.list.d/kali.list

          curl -fsSL https://archive.kali.org/archive-key.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/kali-archive-keyring.gpg

          sudo apt-get update -qq

      # ── 3. Install XFCE desktop ───────────────────────────────────────────
      - name: Install XFCE desktop
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get install -y \
            xfce4 \
            xfce4-goodies \
            xfce4-terminal \
            dbus-x11 \
            x11-xserver-utils \
            xorg

      # ── 4. Install Kali top-10 tools ──────────────────────────────────────
      # Uses -t kali-rolling to explicitly pull from the Kali repo.
      # Held Ubuntu packages are skipped automatically.
      - name: Install Kali tools
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get install -y -t kali-rolling kali-tools-top10 || true

      # ── 5. Install Chrome Remote Desktop ──────────────────────────────────
      - name: Install Chrome Remote Desktop
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          wget -qO /tmp/crd.deb \
            "https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb"
          sudo -E apt-get install -y /tmp/crd.deb

      # ── 6. Install Google Chrome ───────────────────────────────────────────
      - name: Install Google Chrome
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          wget -qO /tmp/chrome.deb \
            "https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb"
          sudo -E apt-get install -y /tmp/chrome.deb

      # ── 7. Configure XFCE as the CRD session ──────────────────────────────
      - name: Configure XFCE session
        run: |
          cat > "$HOME/.chrome-remote-desktop-session" << 'SESS'
#!/bin/bash
export XKL_XMODMAP_DISABLE=1
exec /usr/bin/startxfce4
SESS
          chmod +x "$HOME/.chrome-remote-desktop-session"

          sudo usermod -aG chrome-remote-desktop "$USER" || true
          echo "Session configured for: $USER ($HOME)"

      # ── 8. Authorize CRD — PIN piped via stdin ────────────────────────────
      - name: Authorize Chrome Remote Desktop
        run: |
          PIN="${{ github.event.inputs.rdp_pin }}"

          if ! [[ "$PIN" =~ ^[0-9]{6,}$ ]]; then
            echo "ERROR: PIN must be at least 6 digits (numbers only)."
            exit 1
          fi

          echo "Authorizing CRD host..."
          printf '%s\n%s\n' "$PIN" "$PIN" | \
            DISPLAY= ${{ github.event.inputs.crd_auth_command }}

          echo "CRD authorization done."

      # ── 9. Start CRD daemon ───────────────────────────────────────────────
      - name: Start Chrome Remote Desktop daemon
        run: |
          sudo systemctl enable  chrome-remote-desktop@"$USER" 2>/dev/null || true
          sudo systemctl restart chrome-remote-desktop@"$USER" 2>/dev/null || \
            /opt/google/chrome-remote-desktop/chrome-remote-desktop --start   || true

          sleep 3
          sudo systemctl status chrome-remote-desktop@"$USER" --no-pager || true

      # ── 10. Connection info ───────────────────────────────────────────────
      - name: Print connection info
        run: |
          echo ""
          echo "==========================================="
          echo "  CHROME REMOTE DESKTOP IS READY"
          echo "==========================================="
          echo "  URL : https://remotedesktop.google.com/"
          echo "  PIN : ${{ github.event.inputs.rdp_pin }}"
          echo "  Duration: ${{ github.event.inputs.tunnel_duration }}s"
          echo "==========================================="

      # ── 11. Keep runner alive ─────────────────────────────────────────────
      - name: Keep session alive
        run: sleep "${{ github.event.inputs.tunnel_duration }}"
