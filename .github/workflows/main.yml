name: Kali Linux RDP - Chrome Remote Desktop + XFCE

on:
  workflow_dispatch:
    inputs:
      crd_auth_command:
        description: "CRD command from https://remotedesktop.google.com/headless (Begin > Next > Authorize > copy the Debian command)"
        required: true
        type: string
      rdp_pin:
        description: "Remote Desktop PIN (min 6 digits, numbers only)"
        required: true
        default: "123456"
        type: string
      tunnel_duration:
        description: "Session duration in seconds (max 21600 = 6h)"
        required: true
        default: "21600"
        type: string

jobs:
  kali-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Configure apt pinning to prevent Kali base-files clash
        run: |
          printf 'Package: *\nPin: release o=Ubuntu\nPin-Priority: 900\n\nPackage: *\nPin: release o=Kali\nPin-Priority: 100\n' \
            | sudo tee /etc/apt/preferences.d/99-kali-pin > /dev/null

          sudo apt-mark hold \
            base-files base-passwd \
            libc6 libc-bin libc6-dev \
            dpkg apt apt-utils \
            perl-base login passwd \
            util-linux mount \
            init-system-helpers \
            systemd libsystemd0 udev \
            bash dash grep sed tar gzip \
            coreutils findutils diffutils

          echo "Pinning done — Ubuntu system packages are protected from Kali overrides."

      - name: Add Kali Linux repository
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends curl wget gnupg2 ca-certificates

          echo "deb http://http.kali.org/kali kali-rolling main contrib non-free non-free-firmware" \
            | sudo tee /etc/apt/sources.list.d/kali.list

          curl -fsSL https://archive.kali.org/archive-key.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/kali-archive-keyring.gpg

          sudo apt-get update -qq

      - name: Install XFCE desktop
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get install -y \
            xfce4 xfce4-goodies xfce4-terminal \
            dbus-x11 x11-xserver-utils xorg

      - name: Install Kali top-10 tools
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get install -y -t kali-rolling kali-tools-top10 || true

      - name: Install Chrome Remote Desktop
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          wget -qO /tmp/crd.deb "https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb"
          sudo -E apt-get install -y /tmp/crd.deb

      - name: Install Google Chrome
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          wget -qO /tmp/chrome.deb "https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb"
          sudo -E apt-get install -y /tmp/chrome.deb

      - name: Configure XFCE session for CRD
        run: |
          printf '#!/bin/bash\nexport XKL_XMODMAP_DISABLE=1\nexec /usr/bin/startxfce4\n' \
            > "$HOME/.chrome-remote-desktop-session"
          chmod +x "$HOME/.chrome-remote-desktop-session"
          sudo usermod -aG chrome-remote-desktop "$USER" || true
          echo "Session configured for: $USER ($HOME)"

      - name: Authorize Chrome Remote Desktop
        run: |
          PIN="${{ github.event.inputs.rdp_pin }}"
          if ! [[ "$PIN" =~ ^[0-9]{6,}$ ]]; then
            echo "ERROR: PIN must be at least 6 digits (numbers only)."
            exit 1
          fi
          echo "Authorizing CRD..."
          printf '%s\n%s\n' "$PIN" "$PIN" | DISPLAY= ${{ github.event.inputs.crd_auth_command }}
          echo "CRD authorization complete."

      - name: Start Chrome Remote Desktop daemon
        run: |
          sudo systemctl enable  chrome-remote-desktop@"$USER" 2>/dev/null || true
          sudo systemctl restart chrome-remote-desktop@"$USER" 2>/dev/null || \
            /opt/google/chrome-remote-desktop/chrome-remote-desktop --start || true
          sleep 3
          sudo systemctl status chrome-remote-desktop@"$USER" --no-pager || true

      - name: Print connection info
        run: |
          echo ""
          echo "==========================================="
          echo "  CHROME REMOTE DESKTOP IS READY"
          echo "==========================================="
          echo "  URL : https://remotedesktop.google.com/"
          echo "  PIN : ${{ github.event.inputs.rdp_pin }}"
          echo "  Time: ${{ github.event.inputs.tunnel_duration }}s remaining"
          echo "==========================================="

      - name: Keep session alive
        run: sleep "${{ github.event.inputs.tunnel_duration }}"
