name: Kali Linux RDP with Chrome Remote Desktop

on:
  workflow_dispatch:
    inputs:
      password:
        description: 'VNC Password (minimum 6 characters)'
        required: true
        default: 'kali1234'
      resolution:
        description: 'Display Resolution'
        required: true
        default: '1920x1080'
        type: choice
        options:
        - '1920x1080'
        - '1366x768'
        - '1280x720'
        - '1024x768'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Build and Run Kali Container
      run: |
        # Create Dockerfile for Kali Linux with XFCE and Chrome Remote Desktop
        cat > Dockerfile << 'EOF'
        FROM kalilinux/kali-rolling

        # Set environment variables
        ENV DEBIAN_FRONTEND=noninteractive
        ENV DISPLAY=:1
        ENV SCREEN_RESOLUTION=${RESOLUTION}

        # Update package list and install essential packages
        RUN apt-get update && apt-get install -y \
            sudo \
            wget \
            curl \
            gnupg \
            apt-transport-https \
            ca-certificates \
            software-properties-common \
            supervisor \
            && apt-get clean \
            && rm -rf /var/lib/apt/lists/*

        # Install XFCE desktop environment
        RUN apt-get update && apt-get install -y \
            xfce4 \
            xfce4-goodies \
            kali-desktop-xfce \
            kali-linux-default \
            && apt-get clean \
            && rm -rf /var/lib/apt/lists/*

        # Install Chrome Remote Desktop
        RUN wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | apt-key add - \
            && echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | tee /etc/apt/sources.list.d/google-chrome.list \
            && apt-get update \
            && apt-get install -y google-chrome-stable \
            && apt-get clean \
            && rm -rf /var/lib/apt/lists/*

        # Install Chrome Remote Desktop package
        RUN wget -O chrome-remote-desktop_current_amd64.deb https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb \
            && apt-get install -y ./chrome-remote-desktop_current_amd64.deb \
            && rm chrome-remote-desktop_current_amd64.deb

        # Install additional tools
        RUN apt-get update && apt-get install -y \
            xfonts-base \
            xfonts-100dpi \
            xfonts-75dpi \
            xfonts-scalable \
            xfonts-cyrillic \
            tightvncserver \
            novnc \
            x11vnc \
            xvfb \
            && apt-get clean \
            && rm -rf /var/lib/apt/lists/*

        # Create a non-root user
        RUN useradd -m -s /bin/bash kali \
            && echo "kali:kali" | chpasswd \
            && usermod -aG sudo,kali-trusted kali \
            && mkdir -p /home/kali/.vnc

        # Set up VNC password
        USER kali
        WORKDIR /home/kali
        RUN mkdir -p /home/kali/.vnc \
            && x11vnc -storepasswd "$PASSWORD" /home/kali/.vnc/passwd

        # Set up supervisor configuration
        USER root
        RUN echo "[supervisord]" > /etc/supervisor/conf.d/supervisord.conf \
            && echo "nodaemon=true" >> /etc/supervisor/conf.d/supervisord.conf \
            && echo "" >> /etc/supervisor/conf.d/supervisord.conf \
            && echo "[program:xvfb]" >> /etc/supervisor/conf.d/supervisord.conf \
            && echo "command=/usr/bin/Xvfb :1 -screen 0 ${SCREEN_RESOLUTION}x24" >> /etc/supervisor/conf.d/supervisord.conf \
            && echo "autorestart=true" >> /etc/supervisor/conf.d/supervisord.conf \
            && echo "priority=100" >> /etc/supervisor/conf.d/supervisord.conf \
            && echo "" >> /etc/supervisor/conf.d/supervisord.conf \
            && echo "[program:xfce]" >> /etc/supervisor/conf.d/supervisord.conf \
            && echo "command=/usr/bin/startxfce4" >> /etc/supervisor/conf.d/supervisord.conf \
            && echo "environment=DISPLAY=:1,USER=kali" >> /etc/supervisor/conf.d/supervisord.conf \
            && echo "autorestart=true" >> /etc/supervisor/conf.d/supervisord.conf \
            && echo "priority=200" >> /etc/supervisor/conf.d/supervisord.conf \
            && echo "" >> /etc/supervisor/conf.d/supervisord.conf \
            && echo "[program:vnc]" >> /etc/supervisor/conf.d/supervisord.conf \
            && echo "command=x11vnc -display :1 -rfbauth /home/kali/.vnc/passwd -forever -shared -http -listen 0.0.0.0 -o /var/log/x11vnc.log" >> /etc/supervisor/conf.d/supervisord.conf \
            && echo "autorestart=true" >> /etc/supervisor/conf.d/supervisord.conf \
            && echo "priority=300" >> /etc/supervisor/conf.d/supervisord.conf

        # Expose ports
        EXPOSE 5900 8080

        # Set default command
        CMD ["/usr/bin/supervisord", "-c", "/etc/supervisor/conf.d/supervisord.conf"]
        EOF

        # Build the Docker image
        docker build --build-arg PASSWORD="${{ github.event.inputs.password || 'kali1234' }}" \
                     --build-arg RESOLUTION="${{ github.event.inputs.resolution || '1920x1080' }}" \
                     -t kali-rdp .

        # Run the container in detached mode
        docker run -d \
          --name kali-container \
          --privileged \
          -p 5900:5900 \
          -p 8080:8080 \
          kali-rdp

        # Wait for container to start
        sleep 10

        # Show container status
        echo "Container Status:"
        docker ps | grep kali-container

        # Show container logs
        echo "Container Logs:"
        docker logs kali-container

    - name: Setup noVNC Web Interface
      run: |
        # Install noVNC for web-based access
        sudo apt-get update
        sudo apt-get install -y novnc websockify

        # Configure noVNC to connect to our VNC server
        sudo sed -i 's/localhost:5900/localhost:5900/g' /etc/novnc/index.html

        # Start noVNC server
        sudo systemctl start websockify
        sudo systemctl enable websockify

    - name: Display Connection Information
      run: |
        echo "========================================"
        echo "Kali Linux RDP Environment Setup Complete"
        echo "========================================"
        echo ""
        echo "Your Kali Linux desktop is now running!"
        echo "The container will continue running in the background."
        echo ""
        echo "To access your Kali Linux desktop:"
        echo ""
        echo "1. VNC Access:"
        echo "   - VNC Server: ${{ secrets.GH_HOST || 'localhost' }}:5900"
        echo "   - Password: ${{ github.event.inputs.password || 'kali1234' }}"
        echo ""
        echo "2. Web-based Access (noVNC):"
        echo "   - URL: http://${{ secrets.GH_HOST || 'localhost' }}:8080/vnc.html"
        echo ""
        echo "3. Chrome Remote Desktop:"
        echo "   - Go to https://remotedesktop.google.com/access"
        echo "   - Follow the setup instructions to connect"
        echo ""
        echo "========================================"
        echo "Container Information:"
        echo "Container ID: $(docker inspect -f '{{.Id}}' kali-container | cut -c1-12)"
        echo "Container IP: $(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' kali-container)"
        echo "========================================"

    - name: Keep Container Running
      run: |
        echo "The Kali Linux container is now running in detached mode."
        echo "It will continue running even if you disconnect from this workflow."
        echo ""
        echo "To stop the container later, run:"
        echo "docker stop kali-container"
        echo ""
        echo "To check the container status, run:"
        echo "docker ps | grep kali-container"
