name: Windows RDP - Kali WSL CLI + Chrome Remote Desktop

# ┌──────────────────────────────────────────────────────────────────────┐
# │  HOW TO GET YOUR CRD CODE & REDIRECT URL:                           │
# │  1. Open https://remotedesktop.google.com/headless                   │
# │  2. Click  Begin → Next → Authorize  (sign in with Google)           │
# │  3. From the Debian command shown, copy ONLY:                        │
# │       --code="4/0Axxx..."   → paste into  CRD Code  input           │
# │       --redirect-url="..."  → paste into  CRD Redirect URL  input   │
# │  ⚠  Code expires in ~5 min — paste & Run immediately                │
# └──────────────────────────────────────────────────────────────────────┘

on:
  workflow_dispatch:
    inputs:
      crd_code:
        description: "CRD --code value from remotedesktop.google.com/headless (just the 4/0Axxx... part)"
        required: true
        type: string
      crd_redirect_url:
        description: "CRD --redirect-url value from remotedesktop.google.com/headless"
        required: true
        type: string
      rdp_pin:
        description: "Remote Desktop PIN (min 6 digits, numbers only)"
        required: true
        default: "123456"
        type: string
      tunnel_duration:
        description: "Session duration in seconds (max 21600 = 6h)"
        required: true
        default: "21600"
        type: string

jobs:
  windows-kali-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      # ── 1. Enable WSL2 & Virtual Machine Platform ─────────────────────────
      - name: Enable WSL2 features
        shell: powershell
        run: |
          dism.exe /online /enable-feature /featurename:Microsoft-Windows-Subsystem-Linux /all /norestart
          dism.exe /online /enable-feature /featurename:VirtualMachinePlatform /all /norestart
          Write-Host "WSL2 features enabled."

      # ── 2. Set WSL default version to 2 ──────────────────────────────────
      - name: Set WSL default version
        shell: powershell
        run: |
          wsl --set-default-version 2
          Write-Host "WSL default set to version 2."

      # ── 3. Install Kali Linux (CLI only, no GUI packages) ─────────────────
      - name: Install Kali Linux WSL
        shell: powershell
        run: |
          wsl --install -d kali-linux --no-launch
          Write-Host "Kali Linux installed."

      # ── 4. Bootstrap Kali — update packages, no GUI ───────────────────────
      - name: Bootstrap Kali (CLI tools only)
        shell: powershell
        run: |
          # Run initial setup inside Kali WSL as root, no GUI packages
          wsl -d kali-linux -- bash -c "apt-get update -qq && apt-get upgrade -y -qq && apt-get install -y --no-install-recommends kali-tools-top10 curl wget git nano vim net-tools iputils-ping 2>&1"
          Write-Host "Kali CLI tools installed."

      # ── 5. Create a named user inside Kali ───────────────────────────────
      - name: Create Kali user
        shell: powershell
        run: |
          $pin = "${{ github.event.inputs.rdp_pin }}"
          wsl -d kali-linux -- bash -c "id -u kali 2>/dev/null || useradd -m -s /bin/bash kali && echo 'kali:$pin' | chpasswd && usermod -aG sudo kali"
          Write-Host "Kali user ready."

      # ── 6. Download & install Chrome Remote Desktop host (Windows) ────────
      - name: Install Chrome Remote Desktop (Windows host)
        shell: powershell
        run: |
          $crdUrl = "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi"
          $crdMsi = "$env:TEMP\crd-host.msi"

          Write-Host "Downloading CRD host..."
          Invoke-WebRequest -Uri $crdUrl -OutFile $crdMsi -UseBasicParsing

          Write-Host "Installing CRD host..."
          Start-Process msiexec.exe -ArgumentList "/i `"$crdMsi`" /quiet /norestart" -Wait -NoNewWindow

          Write-Host "CRD host installed."

      # ── 7. Authorize CRD on Windows ───────────────────────────────────────
      # On Windows, CRD uses Windows login credentials — no separate PIN needed.
      # The --code and --redirect-url are the same OAuth values from the
      # headless page; only the executable path differs from Linux.
      - name: Authorize Chrome Remote Desktop
        shell: powershell
        run: |
          $code        = "${{ github.event.inputs.crd_code }}"
          $redirectUrl = "${{ github.event.inputs.crd_redirect_url }}"
          $pin         = "${{ github.event.inputs.rdp_pin }}"

          # Find the versioned CRD host executable
          $crdDir  = "C:\Program Files\Google\Chrome Remote Desktop"
          $hostExe = Get-ChildItem -Path $crdDir -Recurse -Filter "remoting_start_host.exe" `
                       -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName

          if (-not $hostExe) {
            Write-Error "remoting_start_host.exe not found under $crdDir"
            exit 1
          }

          Write-Host "CRD host executable: $hostExe"
          Write-Host "Registering CRD host..."

          & "$hostExe" `
            --code="$code" `
            --redirect-url="$redirectUrl" `
            --name="kali-wsl-actions" `
            --pin="$pin"

          Write-Host "CRD authorization complete."

      # ── 8. Verify CRD service is running ─────────────────────────────────
      - name: Verify CRD service
        shell: powershell
        run: |
          $svc = Get-Service -Name "chromoting" -ErrorAction SilentlyContinue
          if ($svc) {
            Write-Host "CRD service status: $($svc.Status)"
            if ($svc.Status -ne "Running") {
              Start-Service -Name "chromoting"
              Write-Host "CRD service started."
            }
          } else {
            Write-Host "Service 'chromoting' not found — CRD may use a different service name."
            Get-Service | Where-Object { $_.DisplayName -like "*remote*" } | Format-Table Name, Status, DisplayName
          }

      # ── 9. Print connection info ──────────────────────────────────────────
      - name: Print connection info
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "==========================================="
          Write-Host "  CHROME REMOTE DESKTOP IS READY"
          Write-Host "==========================================="
          Write-Host "  URL      : https://remotedesktop.google.com/"
          Write-Host "  PIN      : ${{ github.event.inputs.rdp_pin }}"
          Write-Host "  Duration : ${{ github.event.inputs.tunnel_duration }}s"
          Write-Host "==========================================="
          Write-Host ""
          Write-Host "  Once connected, open Windows Terminal and run:"
          Write-Host "    wsl -d kali-linux"
          Write-Host "  to drop into your Kali CLI."
          Write-Host ""

      # ── 10. Keep runner alive ─────────────────────────────────────────────
      - name: Keep session alive
        shell: powershell
        run: Start-Sleep -Seconds ${{ github.event.inputs.tunnel_duration }}
